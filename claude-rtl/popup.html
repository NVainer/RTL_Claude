<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        margin: 0;
        width: 180px;
        font-family: -apple-system, system-ui, sans-serif;
        background: #1f1f1f;
        color: #eee;
      }
      .wrap {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 16px;
      }
      .label { font-size: 14px; font-weight: 600; }
      #toggle {
        border: 0;
        border-radius: 6px;
        padding: 6px 16px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        min-width: 56px;
      }
      #toggle[data-on="true"] { background: #2e7d32; color: #fff; }
      #toggle[data-on="false"] { background: #555; color: #ddd; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <span class="label">RTL</span>
      <button id="toggle" data-on="true">ON</button>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
